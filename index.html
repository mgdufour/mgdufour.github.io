<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Site Title</title>
    <style>
        /* Accessibility Improvements */
        body {
            /* Ensure good contrast ratios */
            color: #333;
            background-color: #fff;
        }
        .muted {
            color: rgba(128, 128, 128, 0.6); /* Improved contrast for muted text */
        }
        button:focus {
            outline: 2px dashed #005fcc; /* Focus styles for buttons */
            outline-offset: 2px;
        }
        /* Skip link style */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #fff;
            color: #005fcc;
            padding: 8px;
            z-index: 1000;
        }
        .skip-link:focus {
            top: 0;
        }
        /* Fallback for prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            .some-animation {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <a href="#maincontent" class="skip-link">Skip to main content</a>
    <header>
        <h1>Welcome to My Website</h1>
    </header>
    <main id="maincontent">
        <button>Click me</button>
        <p class="muted">This is some muted text.</p>
    </main>
</body>
</html>
