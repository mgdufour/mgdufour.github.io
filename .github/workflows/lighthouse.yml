name: Lighthouse CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start local web server
        run: |
          python3 -m http.server 8080 --directory . > /tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2

      - name: Run Lighthouse (accessibility)
        run: |
          mkdir -p artifacts/lighthouse
          npx -y lighthouse http://127.0.0.1:8080 \
            --chrome-flags="--headless" \
            --only-categories=accessibility \
            --output=html \
            --output=json \
            --output-path=artifacts/lighthouse/accessibility-report \
            --no-enable-error-reporting \
            --quiet

      - name: Run Lighthouse (best-practices)
        run: |
          npx -y lighthouse http://127.0.0.1:8080 \
            --chrome-flags="--headless" \
            --only-categories=best-practices \
            --output=html \
            --output=json \
            --output-path=artifacts/lighthouse/best-practices-report \
            --no-enable-error-reporting \
            --quiet

      - name: Enforce minimum Lighthouse scores
        run: |
          python3 - << 'PY'
          import glob
          import json
          import sys

          blocking_thresholds = {
            "accessibility": 1.0,
          }

          advisory_thresholds = {
            "best-practices": 0.95,
          }

          patterns = {
            "accessibility": "artifacts/lighthouse/*accessibility*.json",
            "best-practices": "artifacts/lighthouse/*best-practices*.json",
          }

          failures = []
          advisories = []

          for category, threshold in {**blocking_thresholds, **advisory_thresholds}.items():
            matches = sorted(glob.glob(patterns[category]))
            if not matches:
              if category in blocking_thresholds:
                failures.append(f"{category}: report JSON not found")
              else:
                advisories.append(f"{category}: report JSON not found")
              continue

            report_path = matches[0]
            with open(report_path, encoding="utf-8") as f:
              report = json.load(f)

            score = report.get("categories", {}).get(category, {}).get("score")
            if score is None:
              if category in blocking_thresholds:
                failures.append(f"{category}: score missing in {report_path}")
              else:
                advisories.append(f"{category}: score missing in {report_path}")
              continue

            print(f"{category}: score={score:.2f}, required>={threshold:.2f}")
            if score < threshold:
              message = f"{category}: score {score:.2f} is below threshold {threshold:.2f}"
              if category in blocking_thresholds:
                failures.append(message)
              else:
                advisories.append(message)

          if advisories:
            print("\nLighthouse advisory findings (non-blocking):")
            for advisory in advisories:
              print(f"::warning::{advisory}")

          if failures:
            print("\nLighthouse score gate failed:")
            for failure in failures:
              print(f"- {failure}")
            sys.exit(1)

          print("\nLighthouse score gate passed.")
          PY

      - name: Stop local web server
        if: always()
        run: |
          if [ -f /tmp/http.pid ]; then
            kill "$(cat /tmp/http.pid)" || true
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: artifacts/lighthouse
          if-no-files-found: error
